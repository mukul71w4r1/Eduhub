<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EduHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnwMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="card">
        <div class="content">
            <img src="EduHUB.png" class="logo" alt="EduHub" style="height: 60px; margin-bottom: 25px; border-radius: 10px; object-fit: contain;">
            <h2>Create Account</h2>
            <h3 style="margin-bottom: 25px;">Join 50,000+ students on their learning journey</h3>
            <form action="index.html">
                <input type="text" placeholder="Full Name" required autocomplete="name">
                <input type="email" placeholder="Email Address" required autocomplete="email">
                <input type="password" placeholder="Password" required>
                <div class="row" style="margin-top:20px; margin-bottom:20px;">
                    <label class="checkbox">
                        <input type="checkbox" required>
                        <div class="check"></div>
                        I agree to the Terms & Conditions
                    </label>
                </div>
                <button type="submit">Complete Sign Up</button>
            </form>
            <p>Already have an account? <a href="login.html">Login Here</a></p>
            <p style="margin-top: 15px;"><a href="index.html" style="color:var(--color-muted);"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
        </div>
        <div class="hero">
            <img src="EduHUB.png" class="logo-white" alt="EduHub" style="height: 60px; margin-bottom: 25px; border-radius: 10px; object-fit: contain;">
            <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1000&auto=format&fit=crop" class="graphic" alt="Students studying together">
        </div>
    </div>
</body>
</html>
